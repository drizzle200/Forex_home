{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<title>{% block title %}My Trading App{% endblock %}</title>

<style>
:root {
    --primary: #1abc9c;
    --primary-dark: #16a085;
    --bg: #f4f6f8;
    --card: #ffffff;
    --text-dark: #2c3e50;
    --muted: #7f8c8d;
    --success: #2ecc71;
    --danger: #e74c3c;
    --info: #3498db;
    --warning: #f39c12;
}

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text-dark);
}

/* ===== Top Navigation ===== */
.topnav {
    background-color: var(--primary);
    overflow: hidden;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    align-items: center;
    padding: 0 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.topnav .nav-links {
    display: flex;
    flex-wrap: wrap;
}

.topnav a {
    color: white;
    text-decoration: none;
    padding: 14px 18px;
    display: block;
    font-weight: 600;
    transition: background 0.3s, color 0.3s;
}

.topnav a:hover {
    background-color: var(--primary-dark);
}

/* Active page highlight */
.topnav a.active {
    background-color: white;
    color: var(--primary);
    border-radius: 4px;
}

/* Hamburger Menu for Mobile */
.hamburger {
    display: none;
    flex-direction: column;
    cursor: pointer;
    padding: 14px;
}

.hamburger div {
    width: 25px;
    height: 3px;
    background-color: white;
    margin: 4px 0;
    transition: all 0.3s;
}

/* Mobile Styles */
@media (max-width: 768px) {
    .topnav .nav-links {
        display: none;
        flex-direction: column;
        width: 100%;
    }

    .topnav .nav-links.show {
        display: flex;
    }

    .hamburger {
        display: flex;
    }

    .topnav a {
        width: 100%;
    }
}

/* Content */
.content {
    padding: 20px;
}
</style>
</head>
<body>

<!-- ===== Top Navigation ===== -->
{% block navigations %}
<div class="topnav">
    <div class="hamburger" id="hamburger">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="nav-links" id="navLinks">
        <a href="{% url 'home' %}">home</a>
        <a href="{% url 'index' %}">Trade</a>
        <a href="{% url 'journal' %}">Journal</a>
        
        <a href="{% url 'trades_view' %}">Trade History</a>

        <a href="{% url 'performance' %}">Performance</a>
       <!-- <a href="#">Account</a>-->
       <a href="{% url 'academy' %}">Academy</a>
        <!-- <a href="{% url 'export_trades' %}">Export Trades</a>-->
        <a href="admin" target="_blank">Admin site</a>
    </div>
</div>
{% endblock %}

{% block header %}
{% endblock %}

<div class="content">
    {% block body %}
    {% endblock %}
</div>

{% block foooter %}
{% endblock %}

<!-- ===== JavaScript ===== -->
<script>
    // ===== Mobile Hamburger Menu =====
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');

    hamburger.addEventListener('click', () => {
        navLinks.classList.toggle('show');
    });

// ===== Highlight Active Page =====
const links = document.querySelectorAll('.nav-links a');
const currentPath = window.location.pathname;  // <-- only path

links.forEach(link => {
    if (link.getAttribute('href') === currentPath) {
        link.classList.add('active');
    }
});

</script>

</body>
</html>
