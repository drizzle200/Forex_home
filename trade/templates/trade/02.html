<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dual Axis Dark Gauge</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/highcharts-more.js"></script>

<style>
body {
    background-color: #121212;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
}
h1 { color: #00ffcc; margin: 20px; }
.gauge-container {
    width: 400px;
    height: 400px;
    margin: 20px;
}
</style>
</head>
<body>

<h1>Dual Axis Dark Gauge Example</h1>

<div id="dual-gauge" class="gauge-container"></div>

<script>
Highcharts.chart('dual-gauge', {

    chart: {
        type: 'gauge',
        backgroundColor: '#1c1c1c',
        plotBorderWidth: 0,
        plotShadow: false
    },

    title: {
        text: 'Win Rate',
        style: { color: '#00ffcc' }
    },

    pane: { startAngle: -150, endAngle: 150 },

    yAxis: [{
        min: 0,
        max: 100,
        lineColor: '#00ffcc',
        tickColor: '#00ffcc',
        minorTickColor: '#00ffcc',
        offset: -25,
        lineWidth: 2,
        labels: { distance: -20, rotation: 'auto', style: { color: '#00ffcc' } },
        tickLength: 7,
        minorTickLength: 5,
        endOnTick: false
    }, {
        min: 0,
        max: 50,
        tickPosition: 'outside',
        lineColor: '#ff3366',
        lineWidth: 2,
        minorTickPosition: 'outside',
        tickColor: '#ff3366',
        minorTickColor: '#ff3366',
        tickLength: 5,
        minorTickLength: 5,
        labels: { distance: 12, rotation: 'auto', style: { color: '#ff3366' } },
        offset: -20,
        endOnTick: false
    }],

    series: [{
        name: 'Win Rate',
        data: [62],
        dataLabels: {
            format: '<span style="color:#00ffcc; font-size:18px">{y}%</span>',
            style: { textOutline: 'none' }
        },
        tooltip: { valueSuffix: ' %' }
    }]

});
</script>

</body>
</html>
