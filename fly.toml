app = "forexhome"
console_command = "/code/manage.py shell"
primary_region = "iad"

[deploy]
release_command = "python manage.py migrate --noinput"

[env]
PORT = "8000"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8000
min_machines_running = 0
processes = [ "web" ]  # Changed from "app" to "web" (common convention)

[[services]]
internal_port = 8000
protocol = "tcp"

[[services.ports]]
handlers = ["tls", "http"]
port = 80

[[services.ports]]
handlers = ["tls"]
port = 443

[[statics]]
guest_path = "/code/static"
tigris_bucket = ""
url_prefix = "/static/"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 1_024

[processes]
web = "gunicorn forexhome.wsgi:application --bind 0.0.0.0:8000 --workers 2"
